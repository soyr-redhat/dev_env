apiVersion: v1
kind: Pod
metadata:
  name: soyr-llama32-1b-fp8
  namespace: machine-learning
  labels:
    app: soyr-llama32-1b-fp8
spec:
  restartPolicy: Never
  containers:
    - name: vllm
      image: vllm/vllm-openai:nightly
      command:
        - python3
        - -m
        - vllm.entrypoints.openai.api_server
      args:
        - --model
        - RedHatAI/Llama-3.2-1B-Instruct-FP8-dynamic
        - --max-num-seqs
        - "32"
        - --port
        - "8000"
      env:
        - name: USER
          value: vllm
        - name: HOME
          value: /tmp/home
        - name: TORCHINDUCTOR_CACHE_DIR
          value: /tmp/torch-cache
      ports:
        - containerPort: 8000
          protocol: TCP
      resources:
        limits:
          nvidia.com/gpu: "1"
        requests:
          nvidia.com/gpu: "1"
          cpu: "4"
          memory: 32Gi
      volumeMounts:
        - name: cache
          mountPath: /root/.cache
        - name: shm
          mountPath: /dev/shm
  nodeSelector:
    nvidia.com/gpu.product: NVIDIA-H100-80GB-HBM3
  volumes:
    - name: cache
      emptyDir: {}
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: 16Gi
---
apiVersion: v1
kind: Service
metadata:
  name: soyr-llama32-1b-fp8
  namespace: machine-learning
spec:
  selector:
    app: soyr-llama32-1b-fp8
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
