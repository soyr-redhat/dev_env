name: Notify recipe sync

on:
  push:
    branches: [main]
    paths:
      - "deployments/**"

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect and dispatch changed deployments
        run: |
          FILES=$(git diff --name-only --diff-filter=AM HEAD~1 HEAD -- 'deployments/*.yaml' 'deployments/*.yml')
          if [ -z "$FILES" ]; then
            echo "No deployment files changed"
            exit 0
          fi

          echo "Changed files:"
          echo "$FILES"

          PAYLOAD='[]'
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            CONTENT=$(cat "$file")
            PAYLOAD=$(echo "$PAYLOAD" | jq --arg name "$file" --arg content "$CONTENT" '. + [{"filename": $name, "content": $content}]')
          done <<< "$FILES"

          curl -s -X POST \
            -H "Authorization: token ${{ secrets.RECIPES_REPO_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/neuralmagic/vllm-openshift-recipes/dispatches \
            -d "$(jq -n --argjson files "$PAYLOAD" '{event_type: "sync-deployment", client_payload: {files: $files}}')"

          echo "Dispatched to vllm-openshift-recipes"
        env:
          GH_TOKEN: ${{ secrets.RECIPES_REPO_TOKEN }}
